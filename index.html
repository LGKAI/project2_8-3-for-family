<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quà 8/3 Cho Gia Đình</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Chúc Mừng Ngày 8/3!!!</h1>
        <p class="subtitle">Gửi ngàn lời yêu thương đến những người phụ nữ tuyệt vời 💖</p>

        <div class="gift-container">
            <div class="person-gift" onclick="showWish('me')">
                <img src="img/me.jpg" alt="Mẹ" class="avatar">
                <div class="gift-box">
                    <div class="box">💝</div>
                    <p>Mẹ</p>
                </div>
            </div>

            <div class="person-gift" onclick="showWish('hien')">
                <img src="img/hien.jpg" alt="Chị Hiền" class="avatar">
                <div class="gift-box">
                    <div class="box">🎁</div>
                    <p>Chị Hiền</p>
                </div>
            </div>

            <div class="person-gift" onclick="showWish('tien')">
                <img src="img/tien.jpg" alt="Chị Tiên" class="avatar">
                <div class="gift-box">
                    <div class="box">🎁</div>
                    <p>Chị Tiên</p>
                </div>
            </div>

            <div class="person-gift" onclick="showWish('nang')">
                <img src="img/nang.jpg" alt="Nắng" class="avatar">
                <div class="gift-box">
                    <div class="box">🎁</div>
                    <p>Nắng</p>
                </div>
            </div>

            <div class="person-gift" onclick="showWish('may')">
                <img src="img/may.jpg" alt="Mây" class="avatar">
                <div class="gift-box">
                    <div class="box">🎁</div>
                    <p>Mây</p>
                </div>
            </div>
        </div>

        <div id="wish-display" class="wish-card hidden">
            <div class="wish-content-wrapper">
                <h2 id="wish-title"></h2>
                <p id="wish-content"></p>
                <button onclick="closeWish()">Đóng lại</button>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
